<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpoGenius — Case Study</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #f4f6f9;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #ffffff;
      border-bottom: 1px solid #e2e8f0;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-logo {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
      font-size: 16px;
      letter-spacing: -0.5px;
    }

    .brand-name {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a2e;
    }

    .brand-subtitle {
      font-size: 13px;
      color: #64748b;
      margin-top: 1px;
    }

    .lang-switcher {
      display: flex;
      gap: 8px;
    }

    .lang-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      color: #475569;
      transition: all 0.15s ease;
    }

    .lang-btn:hover {
      border-color: #4f46e5;
      color: #4f46e5;
      background: #f0f0ff;
    }

    .lang-btn.active {
      border-color: #4f46e5;
      background: #4f46e5;
      color: #ffffff;
    }

    .lang-flag {
      font-size: 18px;
      line-height: 1;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 24px 32px 32px;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
    }

    .doc-title {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 12px;
    }

    .pdf-wrapper {
      flex: 1;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 75vh;
    }

    .pdf-toolbar {
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .pdf-label {
      font-size: 13px;
      font-weight: 500;
      color: #475569;
    }

    .open-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      background: #4f46e5;
      color: #fff;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s;
    }

    .open-btn:hover { background: #4338ca; }

    iframe {
      flex: 1;
      width: 100%;
      border: none;
      min-height: 70vh;
    }

    footer {
      text-align: center;
      padding: 16px;
      font-size: 12px;
      color: #94a3b8;
    }

    @media (max-width: 600px) {
      header { padding: 14px 16px; }
      main { padding: 16px 12px 24px; }
      .lang-btn { padding: 6px 10px; font-size: 13px; }
      iframe { min-height: 60vh; }
    }
  </style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-logo">OG</div>
    <div>
      <div class="brand-name">OpoGenius</div>
      <div class="brand-subtitle">Case Study · Caso Práctico</div>
    </div>
  </div>

  <div class="lang-switcher">
    <button class="lang-btn active" onclick="switchLang('es')" id="btn-es">
      <span class="lang-flag">🇪🇸</span> Español
    </button>
    <button class="lang-btn" onclick="switchLang('en')" id="btn-en">
      <span class="lang-flag">🇬🇧</span> English
    </button>
    <button class="lang-btn" onclick="switchLang('nl')" id="btn-nl">
      <span class="lang-flag">🇳🇱</span> Nederlands
    </button>
  </div>
</header>

<main>
  <div class="pdf-wrapper">
    <div class="pdf-toolbar">
      <span class="pdf-label" id="pdf-label">OpoGenius — Caso Práctico</span>
      <a id="open-link" class="open-btn" href="ES/OpoGenius-CasoPractico.pdf" target="_blank">
        ↗ Abrir en nueva pestaña
      </a>
    </div>
    <iframe id="pdf-frame" src="ES/OpoGenius-CasoPractico.pdf" title="OpoGenius Case Study"></iframe>
  </div>
</main>

<footer>OpoGenius &copy; 2025 · Jasper van Puffelen Lopez</footer>

<script>
  const docs = {
    es: {
      src:   'ES/OpoGenius-CasoPractico.pdf',
      label: 'OpoGenius — Caso Práctico',
      btn:   'Abrir en nueva pestaña'
    },
    en: {
      src:   'EN/OpoGenius-CaseStudy-EN.pdf',
      label: 'OpoGenius — Case Study',
      btn:   'Open in new tab'
    },
    nl: {
      src:   'NL/OpoGenius-CaseStudy-NL.pdf',
      label: 'OpoGenius — Case Study (NL)',
      btn:   'Openen in nieuw tabblad'
    }
  };

  function switchLang(lang) {
    const d = docs[lang];
    document.getElementById('pdf-frame').src  = d.src;
    document.getElementById('open-link').href = d.src;
    document.getElementById('open-link').textContent = '↗ ' + d.btn;
    document.getElementById('pdf-label').textContent = d.label;

    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + lang).classList.add('active');

    document.documentElement.lang = lang;
  }
</script>

</body>
</html>
